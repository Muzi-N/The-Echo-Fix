# Render blueprint for ECHO. Provisions the API web service plus managed
# Postgres and Redis, wiring their connection strings into the service
# automatically. Deploy by pointing Render at this repo; it reads render.yaml.

services:
  - type: web
    name: echo-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: starter
    healthCheckPath: /api/v1/health
    # Migrations run from the compiled output so the runtime image needs no
    # TypeScript tooling. node -e bootstraps TypeORM directly from dist/.
    preDeployCommand: node -e "require('./dist/database/data-source').default.initialize().then(ds => ds.runMigrations()).then(() => { console.log('Migrations OK'); process.exit(0); }).catch(e => { console.error(e); process.exit(1); })"
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        fromDatabase:
          name: echo-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: echo-redis
          property: connectionString
      # Secrets are generated once by Render and held in the service env.
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_TTL
        value: 900s
      - key: JWT_REFRESH_TTL
        value: 30d
      - key: CORS_ORIGINS
        value: "*"
      - key: OTP_DRIVER
        value: console

  # Managed Redis (Render Key Value) lives under services, not databases.
  - type: keyvalue
    name: echo-redis
    plan: starter
    ipAllowList: []

databases:
  - name: echo-postgres
    plan: basic-256mb
    postgresMajorVersion: "16"
